name: Nachtelijke prijssync

on:
  schedule:
    # 03:17 UTC = 04:17/05:17 NL; bewust offset t.o.v. flesvoedingcalculator
    - cron: '17 3 * * *'
  workflow_dispatch: {}

jobs:
  sync-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger prijssync op togwaarde.nl
        run: |
          curl -fsS -X POST \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --max-time 600 \
            https://togwaarde.nl/api/cron/sync-prices | tee result.json
          # Faal de job als de API zelf een fout meldt
          grep -q '"success":true' result.json
